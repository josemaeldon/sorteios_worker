    <rect x="390" y="390" width="180" height="84" rx="14" fill="#EFF6FF"/>
    <text x="408" y="426" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1E3A8A">Faixa</text>
    <text x="408" y="454" font-family="Inter, Arial, sans-serif" font-size="18" fill="#1D4ED8">1 a 75</text>

    <rect x="590" y="390" width="160" height="84" rx="14" fill="#ECFEF2"/>
    <text x="608" y="426" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Cartelas</text>
