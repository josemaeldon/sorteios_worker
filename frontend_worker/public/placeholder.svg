  <rect x="870" y="350" width="380" height="260" rx="20" fill="#111827" stroke="#334155"/>
  <text x="900" y="410" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#94A3B8">Número Sorteado</text>
  <text x="980" y="540" font-family="Inter, Arial, sans-serif" font-size="140" font-weight="900" fill="#3B82F6">75</text>

