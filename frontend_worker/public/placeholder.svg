  <text x="900" y="684" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">Automação • Ranking • Relatórios</text>
  <text x="900" y="720" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94A3B8">Tudo para vender mais sorteios e rifas</text>

  <circle cx="1440" cy="120" r="18" fill="#22C55E"/>
  <text x="1468" y="127" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#86EFAC">ONLINE</text>
