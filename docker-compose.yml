version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bingo
      POSTGRES_USER: postgres
      # WARNING: Change this password for production deployments
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize database with complete schema
      - ./database/database-complete.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bingo
      DB_USER: postgres
      # WARNING: Change this password to match your database password
      DB_PASSWORD: postgres
      PORT: 3001
      APP_URL: http://localhost
      # WARNING: Change these credentials for production deployments
      BASIC_AUTH_USER: admin
      BASIC_AUTH_PASS: admin
      # WARNING: Generate a secure random JWT secret for production
      JWT_SECRET: bingo_jwt_secret_change_in_production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3001
      # WARNING: Change these to match your backend credentials
      VITE_BASIC_AUTH_USER: admin
      VITE_BASIC_AUTH_PASS: admin
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
